name: build

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests -q
        env:
          PYTHONPATH: ${{ github.workspace }}

  package:
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller statlab.spec --noconfirm
      - name: Zip portable build
        run: Compress-Archive -Path dist/StatLab -DestinationPath StatLab-windows.zip
        shell: pwsh
      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: echo "version=$($env:GITHUB_REF_NAME -replace '^v','')" >> $env:GITHUB_OUTPUT
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer.iss
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/StatLab-Setup.exe
            StatLab-windows.zip
          generate_release_notes: true
